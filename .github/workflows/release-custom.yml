name: release-custom

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v2.0-custom.1)"
        required: true
        default: "v2.0-custom.1"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm install
          npm run build:pro

      - name: Build binaries (amd64 + arm64)
        run: |
          mkdir -p build

          # amd64
          (cd core  && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o ../build/1panel-core-amd64 ./cmd/server/main.go)
          (cd agent && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o ../build/1panel-agent-amd64 ./cmd/server/main.go)

          # arm64
          (cd core  && CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags '-s -w' -o ../build/1panel-core-arm64 ./cmd/server/main.go)
          (cd agent && CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags '-s -w' -o ../build/1panel-agent-arm64 ./cmd/server/main.go)

      - name: Package artifacts
        run: |
          mkdir -p dist/amd64 dist/arm64

          cp build/1panel-core-amd64 dist/amd64/1panel-core
          cp build/1panel-agent-amd64 dist/amd64/1panel-agent
          tar czf 1panel-custom-linux-amd64.tar.gz -C dist/amd64 1panel-core 1panel-agent

          cp build/1panel-core-arm64 dist/arm64/1panel-core
          cp build/1panel-agent-arm64 dist/arm64/1panel-agent
          tar czf 1panel-custom-linux-arm64.tar.gz -C dist/arm64 1panel-core 1panel-agent

      - name: Create/Update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          prerelease: false
          generate_release_notes: true
          files: |
            1panel-custom-linux-amd64.tar.gz
            1panel-custom-linux-arm64.tar.gz
            deploy/install-custom.sh
            deploy/quick-install.sh
